<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Guardian - Activity Timeline</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1A237E",
                        "on-primary": "#FFFFFF",
                        "background": "#F8FAFC", // slate-50
                        "surface": "#FFFFFF",
                        "secondary": "#006A62",
                        "error": "#BA1A1A",
                        "error-container": "#FFDAD6",
                        "on-error-container": "#410002",
                        "outline": "#74777F",
                        "surface-container": "#F1F5F9", // slate-100
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                        "full": "9999px",
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 27px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #E2E8F0; /* slate-200 */
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background font-body text-slate-900 selection:bg-primary selection:text-white">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-slate-200">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-slate-200 flex items-center justify-center">
<img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFKdwr_rlKugXxNzAAlx92ldY1qkZfAqWK2Kv-MYjPngx7uPMJD03hBuW4yV9Y6efKsjRLHVNQ96FBQjGojY0dS4WfgZN1DjXLnMjHpIBa8A_RZVlQJBB7pmyq9RDh0xQ58QKaS6KoipfixMGKnYXVx5OaEEqOKvMoAB1EJgLwWGQsJ1CGTMfiGLXllALn259CLlqbFwbiDYyzIxD_Foz890kealGNf41NAN9m3FsJ7nB5OX0iLSa1pRl8Od-eWM7rD_I_5BSuTI8"/>
</div>
<h1 class="text-xl font-bold tracking-tight text-primary font-headline">Guardian</h1>
</div>
<div class="flex items-center gap-2">
<button id="notifBtn" class="p-2 text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-3xl mx-auto">
<!-- Header -->
<section class="mb-10">
<p class="text-xs uppercase tracking-[0.2em] text-slate-500 font-bold mb-2">Digital Footprint</p>
<h2 class="font-headline text-4xl font-extrabold text-primary tracking-tight mb-6">Activity Timeline</h2>
        <!-- Child Selector (Dynamic) -->
        <div id="childSelector" class="flex gap-4 overflow-x-auto pb-4 mb-6 no-scrollbar">
            <!-- Populated by JS -->
        </div>

        <!-- Interactive Filters -->
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button class="filter-btn px-6 py-2.5 rounded-full bg-primary text-white font-semibold text-sm transition-all whitespace-nowrap" data-filter="all">All</button>
            <button class="filter-btn px-6 py-2.5 rounded-full bg-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-300 transition-all whitespace-nowrap" data-filter="app">Apps</button>
            <button class="filter-btn px-6 py-2.5 rounded-full bg-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-300 transition-all whitespace-nowrap" data-filter="web">Web</button>
            <button class="filter-btn px-6 py-2.5 rounded-full bg-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-300 transition-all whitespace-nowrap flex items-center gap-2" data-filter="alert">
                Alerts
                <span class="w-2 h-2 rounded-full bg-error"></span>
            </button>
        </div>
    </section>

    <!-- Timeline Content -->
    <div id="timelineContainer" class="relative timeline-line space-y-8">
        <!-- Date Label and Items will be loaded here -->
        <div class="p-8 text-center animate-pulse">
            <p class="text-slate-400 font-medium tracking-wide">Loading Footprint...</p>
        </div>
    </div>
</div>
<!-- View History Action -->
<div class="mt-12 flex justify-end">
<button class="flex items-center gap-2 text-primary font-bold hover:gap-4 transition-all group py-2">
<span>View Full History</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-2xl border-t border-slate-200 z-50 px-4 pt-3 pb-8">
<div class="max-w-xl mx-auto flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-slate-400 px-3 py-1" href="parent_dashboard_guardian.html">
<span class="material-symbols-outlined text-[24px]" data-icon="dashboard">dashboard</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Insights</span>
</a>
<a class="flex flex-col items-center gap-1 bg-primary text-white rounded-2xl px-5 py-2.5 shadow-lg shadow-primary/20" href="timeline_guardian.html">
<span class="material-symbols-outlined text-[24px]" data-icon="history" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Timeline</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 px-3 py-1" href="app_limits_guardian.html">
<span class="material-symbols-outlined text-[24px]" data-icon="lock_open">lock_open</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Control</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 px-3 py-1" href="ai_rules_guardian.html">
<span class="material-symbols-outlined text-[24px]" data-icon="auto_mode">auto_mode</span>
<span class="text-[10px] font-bold uppercase tracking-widest">AI Rules</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 px-3 py-1" href="#" onclick="fetch('/api/logout',{method:'POST'}).then(()=> { sessionStorage.removeItem('token'); window.location.href='login.html'; });return false;">
<span class="material-symbols-outlined text-[24px]" data-icon="person">person</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Account</span>
</a>
</div>
</nav>

<script>
    (function() {
        const originalFetch = window.fetch;
        window.fetch = function() {
            let [resource, config] = arguments;
            if (config === undefined) config = {};
            if (config.headers === undefined) config.headers = {};
            const token = sessionStorage.getItem('token');
            if (token && resource.toString().startsWith('/api/')) {
                if (config.headers instanceof Headers) {
                    config.headers.set('Authorization', 'Bearer ' + token);
                } else {
                    config.headers['Authorization'] = 'Bearer ' + token;
                }
            }
            return originalFetch(resource, config);
        };
    })();

    let activeChildId = null;
    let activeFilter = 'all';

    async function loadChildren() {
        try {
            const res = await fetch('/api/children');
            if (res.status === 401) { window.location.href = 'login.html'; return; }
            const children = await res.json();
            const selector = document.getElementById('childSelector');
            selector.innerHTML = '';

            if (children.length === 0) {
                document.getElementById('timelineContainer').innerHTML = `
                    <div class="p-8 text-center bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-500 font-bold mb-4">No children connected yet.</p>
                        <a href="parent_dashboard_guardian.html" class="text-primary font-bold underline">Go to Dashboard to add a child</a>
                    </div>`;
                return;
            }

            children.forEach(child => {
                const isSelected = activeChildId === child.id || (!activeChildId && children.indexOf(child) === 0);
                if (isSelected && !activeChildId) activeChildId = child.id;

                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center gap-2 flex-shrink-0 transition-all ${isSelected ? 'scale-105 opacity-100' : 'opacity-40 grayscale hover:grayscale-0 hover:opacity-100'}`;
                btn.innerHTML = `
                    <div class="w-16 h-16 rounded-full border-2 ${isSelected ? 'border-primary' : 'border-slate-200'} overflow-hidden p-0.5 bg-white">
                        <div class="w-full h-full rounded-full bg-slate-100 flex items-center justify-center overflow-hidden">
                            <span class="material-symbols-outlined text-slate-400 text-3xl">account_circle</span>
                        </div>
                    </div>
                    <span class="text-[10px] font-extrabold uppercase tracking-widest text-primary">${child.name}</span>
                `;
                btn.onclick = () => {
                    activeChildId = child.id;
                    loadChildren(); // Refresh selector UI
                    loadTimeline(child.id);
                };
                selector.appendChild(btn);
            });

            if (activeChildId) loadTimeline(activeChildId);
        } catch(e) { console.error(e); }
    }

    async function loadTimeline(childId) {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = '<div class="p-8 text-center animate-pulse text-slate-400 font-medium">Fetching History...</div>';

        try {
            const res = await fetch(`/api/stats/timeline/${childId}`);
            const logs = await res.json();
            container.innerHTML = '';

            if (logs.length === 0) {
                container.innerHTML = `<p class="p-8 text-center text-slate-400 font-bold italic">No activity logs recorded for this child yet.</p>`;
                return;
            }

            // Simple group by date (Mocking just for visualization)
            container.innerHTML = `
                <div class="relative z-10 flex items-center gap-4">
                    <div class="w-14 flex justify-center">
                        <div class="w-3 h-3 rounded-full bg-primary border-2 border-background"></div>
                    </div>
                    <span class="font-headline font-bold text-xs text-slate-400 uppercase tracking-widest">Recent Activity</span>
                </div>
            `;

            logs.forEach(log => {
                // Filter logic
                const isApp = true; // For now assuming all are apps in dummy DB
                if (activeFilter !== 'all' && activeFilter !== 'app') return;

                const itemHtml = `
                    <div class="relative z-10 flex gap-4 group animate-in fade-in duration-500">
                        <div class="w-14 flex flex-col items-center flex-shrink-0 pt-1">
                            <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-sm ring-1 ring-slate-100">
                                <span class="material-symbols-outlined text-primary">${isApp ? 'videogame_asset' : 'language'}</span>
                            </div>
                        </div>
                        <div class="flex-grow bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-bold text-primary uppercase tracking-widest">${isApp ? 'App Open' : 'Web Visit'}</span>
                                <span class="text-[10px] text-slate-400 font-semibold uppercase">${new Date(log.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <h3 class="font-headline font-bold text-lg text-primary">${log.app_name}</h3>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="bg-indigo-50 text-indigo-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">${Math.floor(log.duration_seconds/60)}m Usage</span>
                                    <span class="text-[9px] text-slate-400 font-bold italic uppercase">Opened ${log.frequency}x today</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += itemHtml;
            });
        } catch(e) { console.error(e); }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-primary', 'text-white');
                b.classList.add('bg-slate-200', 'text-slate-700');
            });
            btn.classList.remove('bg-slate-200', 'text-slate-700');
            btn.classList.add('bg-primary', 'text-white');
            activeFilter = btn.dataset.filter;
            if (activeChildId) loadTimeline(activeChildId);
        });
    });

    // Notification logic
    document.getElementById('notifBtn')?.addEventListener('click', async () => {
        try {
            const res = await fetch('/api/notifications');
            const notifs = await res.json();
            if (notifs.length === 0) {
                alert('No new notifications.');
            } else {
                const msg = notifs.map(n => `- ${n.title}: ${n.message}`).join('\n');
                alert(`Recent Notifications:\n${msg}`);
            }
        } catch(e) { alert('Failed to fetch notifications.'); }
    });

    loadChildren();

    // Auto-refresh timeline every 10 seconds for "lively" feel
    setInterval(() => {
        if (activeChildId) loadTimeline(activeChildId);
    }, 10000);
</script>
</body></html>
