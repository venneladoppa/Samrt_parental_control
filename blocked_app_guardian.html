<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>App Blocked - Guardian</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1A237E",
              "on-primary": "#ffffff",
              "background": "#F8FAFC", // slate-50
              "surface": "#ffffff",
              "on-surface": "#1E293B",
              "on-surface-variant": "#64748B",
              "secondary": "#3F51B5",
              "secondary-container": "#E8EAF6",
              "surface-container-low": "#F1F5F9",
              "surface-container-highest": "#E2E8F0",
              "outline-variant": "#CBD5E1",
              "error": "#B91C1C",
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .primary-gradient {
        background: #1A237E;
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen overflow-hidden">
<!-- App Overlay Shell -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8">
<div class="relative w-full max-w-lg mx-auto flex flex-col items-center text-center space-y-8">
<!-- Illustration Area -->
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<!-- Outer Ring -->
<div class="absolute inset-0 border-2 border-primary/5 rounded-full"></div>
<!-- Soft Glow -->
<div class="absolute inset-12 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Main Protective Iconography -->
<div class="relative flex flex-col items-center">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-surface shadow-sm border border-slate-100 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-6xl md:text-7xl" style="font-variation-settings: 'FILL' 1;">
                            bedtime
                        </span>
</div>
<!-- Floating App Icon Bubble -->
<div class="absolute -top-2 -right-2 w-14 h-14 bg-white rounded-2xl shadow-lg flex items-center justify-center border border-slate-100">
<img alt="Roblox Icon" class="w-10 h-10 rounded-xl" data-alt="simplified 3d game controller icon in a bright red and white color scheme with rounded edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBZ9QM9r90ihWglF9YIisxmGMxpvJu36NsKnP6LZvSJ6uWQKMBaVQOL5pSwkEs8TZD7VjTtudNC4dWuODPeoQ08oFw6LJ285YpwSA0FOlCeTmaJ14bbBZ8cNudd8inW4wLS7fM8pyM_DLQj-z4DFHV9E0DKQ0q3MHNSgEGQ2hZN35rrwZaexhSokkij8WZ66rUU3JdjbA2m0M51VeQWzYkcTFRooxIlSr05ddf_kcLWAqvXBRwc_5UwG23xjZqfJZv8t-ZocE7riU4"/>
</div>
</div>
</div>
<!-- Content Hierarchy -->
<div class="space-y-4 px-4">
<h1 class="font-headline font-extrabold text-4xl md:text-5xl tracking-tight text-primary">
                    Time's Up for Roblox!
                </h1>
<p class="text-on-surface-variant text-lg max-w-xs mx-auto leading-relaxed">
                    You've reached your daily limit for this app. It's time to take a little break.
                </p>
</div>
<!-- Dashboard Style Info Card -->
<div class="w-full bg-surface border border-slate-200 rounded-2xl p-6 flex items-center justify-between shadow-sm">
<div class="flex items-center space-x-4">
<div class="p-3 bg-secondary-container rounded-full">
<span class="material-symbols-outlined text-primary">timer</span>
</div>
<div class="text-left">
<p class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-0.5">Today's Usage</p>
<p class="font-headline font-bold text-xl text-primary">2h 00m <span class="text-sm font-medium text-on-surface-variant">/ 2h</span></p>
</div>
</div>
<div class="h-12 w-px bg-slate-200"></div>
<div class="text-right">
<p class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-0.5">Status</p>
<div class="flex items-center text-on-surface font-bold">
<span class="w-2 h-2 rounded-full bg-primary mr-2"></span>
                        Locked
                    </div>
</div>
</div>
<!-- Primary Actions -->
<div class="w-full space-y-4 px-4">
<button class="w-full py-4 px-8 primary-gradient text-on-primary rounded-full font-headline font-bold text-lg shadow-md active:scale-[0.98] transition-all duration-200">
                    Request More Time
                </button>
<button class="w-full py-4 px-8 bg-surface-container-highest text-primary rounded-full font-headline font-bold text-lg hover:bg-slate-300 transition-colors active:scale-[0.98] duration-200">
                    Go Back
                </button>
</div>
<!-- Secondary Action -->
<div class="pt-4 pb-8">
<button class="flex items-center space-x-2 text-on-surface-variant font-label font-medium hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-sm group-hover:rotate-12 transition-transform">lock_person</span>
<span class="underline underline-offset-4 decoration-slate-300 group-hover:decoration-primary">Parent Bypass</span>
</button>
</div>
</div>
</div>
<!-- Background Layer -->
<div class="fixed inset-0 -z-10 bg-slate-50 flex flex-col items-center justify-center p-12 opacity-40 blur-sm pointer-events-none">
<div class="w-full max-w-4xl grid grid-cols-3 gap-6">
<div class="aspect-video bg-white border border-slate-200 rounded-xl"></div>
<div class="aspect-video bg-white border border-slate-200 rounded-xl"></div>
<div class="aspect-video bg-white border border-slate-200 rounded-xl"></div>
<div class="col-span-2 aspect-[2/1] bg-white border border-slate-200 rounded-xl"></div>
<div class="aspect-square bg-white border border-slate-200 rounded-xl"></div>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Read app name from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const appName = urlParams.get('app') || 'This App';
    
    // Update the heading
    const heading = document.querySelector('h1');
    if (heading) {
        heading.innerText = `Time's Up for ${appName}!`;
    }

    // Navigation logic
    const goBackBtn = document.querySelectorAll('button')[1];
    if (goBackBtn) {
        goBackBtn.addEventListener('click', () => {
            window.location.href = 'child_home_guardian.html';
        });
    }

    // Placeholder alert for other buttons
    document.querySelectorAll('button').forEach((btn, idx) => {
        if (idx !== 1) { // Not the Go Back button
            btn.addEventListener('click', () => {
                alert('A request has been sent to your parent.');
            });
        }
    });
});
</script>
</body></html>
