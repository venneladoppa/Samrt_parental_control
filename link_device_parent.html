<script>
    (function() {
        const originalFetch = window.fetch;
        window.fetch = function() {
            let [resource, config] = arguments;
            if (config === undefined) config = {};
            if (config.headers === undefined) config.headers = {};
            const token = sessionStorage.getItem('token');
            if (token && resource.toString().startsWith('/api/')) {
                if (config.headers instanceof Headers) {
                    config.headers.set('Authorization', 'Bearer ' + token);
                } else {
                    config.headers['Authorization'] = 'Bearer ' + token;
                }
            }
            return originalFetch(resource, config);
        };
    })();

document.addEventListener('DOMContentLoaded', () => {
    const selector = document.getElementById('childSelector');
    
    // Load existing children
    async function loadChildren() {
        try {
            const res = await fetch('/api/children');
            const data = await res.json();
            selector.innerHTML = '<option value="">Select a Child Profile</option>';
            data.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.innerText = c.name;
                selector.appendChild(opt);
            });
        } catch(e) { console.error(e); }
    }
    loadChildren();

    // Link Handler
    const linkBtn = document.querySelector('button.bg-primary');
    linkBtn.addEventListener('click', async () => {
        const child_id = selector.value;
        const code = document.getElementById('pairing-code').value;
        
        if (!child_id || !code) {
            alert('Please select a child and enter a pairing code.');
            return;
        }

        try {
            const res = await fetch('/api/devices/pair', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ child_id, code })
            });

            if (res.ok) {
                alert('Device linked successfully!');
                window.location.href = 'parent_dashboard_guardian.html';
            } else {
                const err = await res.json();
                alert(err.error || 'Pairing failed. Please check the code.');
            }
        } catch(e) { alert('Network error.'); }
    });

    // Back button
    document.querySelector('header button').onclick = () => window.history.back();
});
</script>
